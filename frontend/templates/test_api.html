<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>Testing Admin API</h1>
    <button onclick="testAPI()">Test /admin/users/ endpoint</button>
    <pre id="result"></pre>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Loading...';

            try {
                const response = await fetch(`${API_BASE}/admin/users/?skip=0&limit=5`);
                resultEl.textContent = `Status: ${response.status}\n`;
                resultEl.textContent += `Status Text: ${response.statusText}\n\n`;

                const text = await response.text();
                resultEl.textContent += `Response:\n${text}`;

                if (response.ok) {
                    try {
                        const json = JSON.parse(text);
                        resultEl.textContent += `\n\nParsed JSON:\n${JSON.stringify(json, null, 2)}`;
                    } catch (e) {
                        resultEl.textContent += `\n\nFailed to parse JSON: ${e.message}`;
                    }
                }
            } catch (error) {
                resultEl.textContent = `Error: ${error.message}\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
